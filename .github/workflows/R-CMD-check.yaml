# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, develop, snapshot, new-version-RProtoBuf-0.4.25]
  pull_request:
    branches: [main, develop, snapshot]
  workflow_dispatch:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: macos-latest,   r: 'oldrel-1'}
          - {os: macos-latest,   r: 'oldrel-2'}
          - {os: macos-latest,   r: '4.1.0'}

          - {os: windows-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: windows-latest,  r: 'release'}
          - {os: windows-latest,  r: 'oldrel-1'}
          - {os: windows-latest,  r: 'oldrel-2'}
          - {os: windows-latest,  r: '4.1.0'}

          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: ubuntu-latest,  r: 'oldrel-2'}
          - {os: ubuntu-latest,  r: 'oldrel-3'}
          - {os: ubuntu-latest,  r: '4.1.0'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '17'

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Set up for RProtoBuf on Windows
        if: runner.os == 'Windows'
        run: choco install protoc

      - name: Set up for RProtoBuf on macos
        if: runner.os == 'macOS'
        run: |
            R CMD javareconf
            brew install protobuf
            BREW_PREFIX=$(brew --prefix protobuf)

            echo "PKG_CPPFLAGS=-I${BREW_PREFIX}/include" >> $GITHUB_ENV
            echo "PKG_LIBS=-L${BREW_PREFIX}/lib" >> $GITHUB_ENV

      - name: Set up for RProtoBuf on ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install protobuf-compiler libprotobuf-dev libprotoc-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, github::eddelbuettel/rprotobuf@0.4.23
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          upload-results: true
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
          args: 'c("--no-manual", "--as-cran", "--no-multiarch", "--run-donttest")'
          error-on: '"warning"'
